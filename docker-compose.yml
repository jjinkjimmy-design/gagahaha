version: "3.9"

# Local development only
# Production: deploy the Dockerfile directly to Railway / Render / Fly.io / DigitalOcean
# The platform provides Postgres and TLS automatically

services:
  db:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nexusrdm
      POSTGRES_USER:     nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nexus_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD}@db:5432/nexusrdm
      NODE_ENV: production
    ports:
      - "4000:4000"

volumes:
  pgdata:
